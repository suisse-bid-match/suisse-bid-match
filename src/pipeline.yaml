openai:
  model: gpt-5-mini
  base_url: https://api.openai.com/v1
  file_purpose: user_data
  enable_web_search: false

kb:
  source_dir: src/prepare/upload_corpus_kb
  vector_store_name: lighting_kb
  kb_key: lighting_kb
  description: Swiss lighting tender knowledge base.
  max_num_results: 12

db:
  container: mysql
  user: root
  password: root
  database: pim_raw
  tables:
    - vw_bid_products
    - vw_bid_specs
  join_key: product_id

runtime:
  output_dir: runtime
  keep_intermediate: true
